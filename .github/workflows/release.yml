name: "Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating a release"
        required: false
        default: "true" # Defaulting to true — manual runs are dry by default for safety

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Create release

    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: write

    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Prepare and Package Release Assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          REPO_NAME="${{ github.event.repository.name }}"
          DIST_DIR="dist/${REPO_NAME}-${VERSION}"

          # 1. Create a clean distribution directory structure
          mkdir -p "$DIST_DIR"

          # 2. Copy all your scripts and repository files into the distribution folder
          # Excludes hidden files/dirs like .git and .github
          rsync -rr --exclude='.git*' . "$DIST_DIR"

          # 3. Strip badges and inject version under the README.html title
          grep -v 'img.shields.io\|sonarcloud.io/api/project_badges' README.md \
            | sed "s/^# \(.*\)/# \1\n\n**Version:** ${VERSION}/" \
            > /tmp/README.md

          # 4. Generate README.html directly into the distribution folder
          pandoc /tmp/README.md -f gfm -t html -s --embed-resources --standalone -o "${DIST_DIR}/README.html"

          # 5. Compress the folder into custom zip and tar.gz files
          cd dist
          zip -r "../${REPO_NAME}-${VERSION}.zip" "${REPO_NAME}-${VERSION}"
          tar -czf "../${REPO_NAME}-${VERSION}.tar.gz" "${REPO_NAME}-${VERSION}"

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run completed -- no release was created."

      - name: Upload release assets
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          # This disables GitHub's default un-customized source downloads
          fail_on_unmatched_files: true
          files: |
            *.zip
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
